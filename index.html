<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fallout 4: Command Terminal</title>
    <style>
        :root { --p-green: #00ff41; --p-dark: #050505; --p-gold: #ffcc00; --p-blue: #0088ff; --p-red: #ff3333; --p-glass: rgba(0, 255, 65, 0.1); }
        body { 
            background-color: var(--p-dark); color: var(--p-green); 
            font-family: 'Courier New', Courier, monospace; margin: 0; padding: 0;
            user-select: none; overflow: hidden; background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 2px, 3px 100%;
        }
        
        #hud { border-bottom: 2px solid var(--p-green); padding: 10px; background: #000; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 0 15px var(--p-green); }
        .cap-count { font-size: 20px; color: var(--p-gold); cursor: pointer; text-shadow: 0 0 5px var(--p-gold); }

        .tabs { display: flex; background: #111; border-bottom: 1px solid var(--p-green); }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: var(--p-green); font-weight: bold; font-size: 11px; letter-spacing: 1px; }
        .tab-btn.active { background: var(--p-green); color: #000; box-shadow: inset 0 0 10px #000; }

        .page { display: none; padding: 15px; height: calc(100vh - 220px); overflow-y: auto; scrollbar-width: none; }
        .page.active { display: block; }

        /* 3D SETTLEMENT GRID */
        #settlement-grid {
            width: 100%; height: 280px; background: #080808; border: 1px solid var(--p-green);
            position: relative; perspective: 1000px; overflow: hidden;
            background-image: 
                linear-gradient(var(--p-glass) 1px, transparent 1px),
                linear-gradient(90deg, var(--p-glass) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .placed-item { 
            position: absolute; width: 40px; height: 40px; 
            border: 2px solid var(--p-green); background: var(--p-glass);
            display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: bold;
            transform: rotateX(20deg); box-shadow: 0 5px 10px rgba(0,0,0,0.5);
        }

        /* POWER ARMOR RENDERER */
        .pa-card { background: #111; border: 1px solid var(--p-green); margin-bottom: 20px; padding: 10px; text-align: center; border-radius: 5px; }
        .pa-svg { width: 140px; height: 180px; filter: drop-shadow(0 0 8px var(--p-green)); margin: 10px 0; }
        
        /* RADIO INTERFACE */
        #radio-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; border-top: 2px solid var(--p-green); display: flex; align-items: center; padding: 0 10px; gap: 10px; }
        .viz { display: flex; gap: 2px; align-items: flex-end; height: 30px; }
        .bar { width: 3px; background: var(--p-green); animation: bounce 0.5s infinite alternate; }
        @keyframes bounce { from { height: 5px; } to { height: 25px; } }

        .btn { background: #000; border: 1px solid var(--p-green); color: var(--p-green); padding: 12px; margin: 5px 0; width: 100%; text-align: left; font-family: inherit; font-size: 12px; }
        .btn:active { background: var(--p-green); color: #000; }
        .price { color: var(--p-gold); float: right; }
    </style>
</head>
<body>

<div id="hud">
    <div onclick="checkSecret()" class="cap-count">CAPS: <span id="cap-text">0</span></div>
    <div style="font-size:10px; text-align:right">DEF: <span id="def-text">0</span><br>INC: <span id="inc-text">0</span></div>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="openPage('scavenge')">SCAVENGE</button>
    <button class="tab-btn" onclick="openPage('settlement')">SETTLEMENT</button>
    <button class="tab-btn" onclick="openPage('garage')">GARAGE</button>
</div>

<div id="scavenge" class="page active">
    <div id="loot-log" style="height:30px; font-size:11px; text-align:center; color:var(--p-gold)"></div>
    <div class="btn" style="height:80px; text-align:center; line-height:55px; border-style:dashed; font-size:16px;" onclick="manualScavenge()">INITIATE SCAVENGING RUN</div>
    <h4 style="border-bottom:1px solid var(--p-green)">TERMINAL MARKET</h4>
    <div id="market-list"></div>
    <h4 style="border-bottom:1px solid var(--p-green)">INVENTORY</h4>
    <div id="loot-list"></div>
</div>

<div id="settlement" class="page">
    <div id="settlement-grid" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    <p style="font-size:10px">DEPLOY MODULES VIA DRAG-DROP:</p>
    <div style="display:flex; gap:10px; overflow-x:auto; padding-bottom:10px;">
        <div class="btn" style="width:100px; flex-shrink:0; font-size:10px" draggable="true" ondragstart="drag(event, 'mutfruit')">MUTFRUIT<br>150C</div>
        <div class="btn" style="width:100px; flex-shrink:0; font-size:10px" draggable="true" ondragstart="drag(event, 'wall')">STEEL WALL<br>300C</div>
        <div class="btn" style="width:100px; flex-shrink:0; font-size:10px" draggable="true" ondragstart="drag(event, 'turret')">TURRET MK1<br>1200C</div>
    </div>
</div>

<div id="garage" class="page">
    <div id="pa-display"></div>
</div>

<div id="radio-bar">
    <div class="viz"><div class="bar"></div><div class="bar" style="animation-delay:0.1s"></div><div class="bar" style="animation-delay:0.2s"></div></div>
    <div style="font-size:10px">RADIO:<br><span id="station-name" style="color:var(--p-gold)">DIAMOND CITY RADIO</span></div>
    <button class="btn" style="width:60px; font-size:9px; margin:0; margin-left:auto;" onclick="toggleRadio()">TUNE</button>
</div>

<script>
let state = { caps: 0, def: 0, inc: 0, pa: [], loot: {}, secret: 0, station: 0 };

const PA_MODELS = {
    't45': { name: 'T-45 MODEL', price: 5000, body: "M40,30 L60,30 L70,150 L30,150 Z", head: "M42,10 L58,10 L62,28 L38,28 Z" },
    't51': { name: 'T-51 MODEL', price: 12000, body: "M35,30 L65,30 L75,160 L25,160 Z", head: "M40,5 L60,5 L65,28 L35,28 Z" },
    't60': { name: 'T-60 MODEL', price: 25000, body: "M30,30 L70,30 L85,170 L15,170 Z", head: "M38,12 L62,12 L68,30 L32,30 Z" },
    'x01': { name: 'X-01 ADVANCED', price: 60000, body: "M20,40 L80,40 L100,180 L0,180 Z", head: "M35,15 L65,15 L75,40 L25,40 Z" }
};

const MODULES = {
    'mutfruit': { name: 'PLANT', price: 150, inc: 6, def: 0, label: 'MUTFRUIT' },
    'wall': { name: 'WALL', price: 300, inc: 0, def: 12, label: 'STEEL' },
    'turret': { name: 'TURRET', price: 1200, inc: 0, def: 55, label: 'MK1' }
};

const STATIONS = ["DIAMOND CITY RADIO", "ENCLAVE FREQUENCY", "RADIO FREEDOM", "OFF"];

function manualScavenge() {
    state.caps += 2;
    if (Math.random() < 0.1) {
        const loots = ["GOLD DEATHCLAW HIDE", "PRE-WAR CIRCUITRY", "FUSION CORE"];
        let item = loots[Math.floor(Math.random()*loots.length)];
        state.loot[item] = (state.loot[item] || 0) + 1;
        document.getElementById('loot-log').innerText = "ALERT: " + item + " RETRIEVED";
    }
    update();
}

function allowDrop(ev) { ev.preventDefault(); }
function drag(ev, id) { ev.dataTransfer.setData("id", id); }

function drop(ev) {
    ev.preventDefault();
    let id = ev.dataTransfer.getData("id");
    let mod = MODULES[id];
    if (state.caps >= mod.price) {
        state.caps -= mod.price;
        let rect = ev.target.getBoundingClientRect();
        let el = document.createElement('div');
        el.className = 'placed-item';
        el.style.left = (ev.clientX - rect.left - 20) + 'px';
        el.style.top = (ev.clientY - rect.top - 20) + 'px';
        el.innerText = mod.label;
        ev.target.appendChild(el);
        state.def += mod.def;
        state.inc += mod.inc;
        update();
    }
}

function buyPA(id) {
    if (state.caps >= PA_MODELS[id].price) {
        state.caps -= PA_MODELS[id].price;
        state.pa.push({ model: id, paint: "#444", paintName: "STANDARD" });
        update();
    }
}

function toggleRadio() {
    state.station = (state.station + 1) % STATIONS.length;
    document.getElementById('station-name').innerText = STATIONS[state.station];
}

setInterval(() => {
    if (state.def < Math.random() * 150) {
        let loss = Math.floor(state.caps * 0.1);
        state.caps -= loss;
        document.getElementById('loot-log').innerText = "RAID DETECTED: -" + loss + " CAPS";
    } else {
        document.getElementById('loot-log').innerText = "RAID DEFLECTED";
    }
    update();
}, 60000);

function openPage(p) {
    document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(p).classList.add('active');
    event.currentTarget.classList.add('active');
}

function checkSecret() {
    state.secret++;
    if(state.secret === 10) { state.caps += 10000; alert("VAULT-TEC OVERRIDE ACTIVE: +10,000C"); }
    update();
}

function update() {
    document.getElementById('cap-text').innerText = Math.floor(state.caps).toLocaleString();
    document.getElementById('def-text').innerText = state.def;
    document.getElementById('inc-text').innerText = state.inc;

    // Render Market
    let mH = '';
    for(let id in PA_MODELS) mH += `<button class="btn" onclick="buyPA('${id}')">ACQUIRE ${PA_MODELS[id].name} <span class="price">${PA_MODELS[id].price}C</span></button>`;
    document.getElementById('market-list').innerHTML = mH;

    // Render Inventory
    let lH = '';
    for(let l in state.loot) if(state.loot[l]>0) lH +=
