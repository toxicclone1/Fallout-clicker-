<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fallout: Visual Commander</title>
    <style>
        :root { --p-green: #00ff41; --p-dark: #050505; --p-gold: #ffcc00; --p-blue: #0088ff; }
        body { 
            background-color: var(--p-dark); color: var(--p-green); 
            font-family: 'Courier New', Courier, monospace; margin: 0; padding: 0;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        
        #hud { border-bottom: 2px solid var(--p-green); padding: 15px; background: #000; position: sticky; top: 0; z-index: 100; }
        .cap-count { font-size: 24px; color: var(--p-gold); margin: 0; cursor: pointer; }
        
        .tabs { display: flex; background: #111; border-bottom: 1px solid var(--p-green); overflow-x: auto; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; color: var(--p-green); font-family: inherit; font-weight: bold; font-size: 11px; }
        .tab-btn.active { background: var(--p-green); color: #000; }

        .page { display: none; padding: 20px; padding-bottom: 100px; }
        .page.active { display: block; }

        /* Power Armor Visual Display */
        .pa-display {
            width: 100%; height: 250px; border: 2px solid var(--p-green);
            margin: 10px 0; background: #111; position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .pa-icon { font-size: 100px; filter: drop-shadow(0 0 10px var(--p-green)); transition: 0.3s; }
        .pa-stats { position: absolute; bottom: 5px; left: 10px; font-size: 12px; color: var(--p-gold); }

        .btn { 
            background: #111; border: 1px solid var(--p-green); color: var(--p-green);
            padding: 12px; margin: 8px 0; width: 100%; text-align: left; border-radius: 5px; font-size: 14px;
        }
        .btn:active { background: #222; }
        .price { color: var(--p-gold); float: right; }
        
        #settlement-view { height: 100px; border: 1px solid #333; margin-bottom: 15px; display: flex; flex-wrap: wrap; padding: 10px; gap: 5px; overflow-y: auto; }
        .v-item { font-size: 20px; }

        .paint-grid { display: flex; gap: 10px; margin: 10px 0; }
        .swatch { width: 35px; height: 35px; border: 2px solid #fff; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="hud">
        <p class="cap-count" onclick="checkSecret()">CAPS: <span id="cap-text">0</span></p>
        <small id="cps-text">Production: 0/sec</small>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openPage('scavenge')">SCAVENGE</button>
        <button class="tab-btn" onclick="openPage('trade')">TRADE</button>
        <button class="tab-btn" onclick="openPage('settlement')">SETTLEMENT</button>
        <button class="tab-btn" onclick="openPage('garage')">GARAGE</button>
    </div>

    <div id="scavenge" class="page active">
        <div id="loot-alert" style="color:var(--p-gold); height:20px; text-align:center;"></div>
        <div style="height:80px; border:2px dashed var(--p-green); display:flex; align-items:center; justify:center; font-weight:bold; margin-bottom:20px;" onclick="manualClick()">TAP TO SCAVENGE</div>
        <h3>MARKET</h3>
        <div id="market-list"></div>
    </div>

    <div id="trade" class="page">
        <h3>VALUABLE LOOT</h3>
        <div id="inventory-list"></div>
    </div>

    <div id="settlement" class="page">
        <h3>CONSTRUCTION VIEW</h3>
        <div id="settlement-view"></div>
        <div id="workshop-list"></div>
    </div>

    <div id="garage" class="page">
        <h3>POWER ARMOR STATION</h3>
        <div id="garage-content"></div>
    </div>

    <script>
        let state = {
            caps: 0, secretClicks: 0, counts: {}, inventory: [], loot: {}, paCustoms: {}
        };

        const MARKET = [
            { id: 't45', name: "T-45 Frame", price: 2000, type: 'PA', icon: '🤖' },
            { id: 't60', name: "T-60 Frame", price: 15000, type: 'PA', icon: '🛡️' },
            { id: 'x01', name: "X-01 Frame", price: 50000, type: 'PA', icon: '💀' }
        ];

        const WORKSHOP = [
            { id: 'settler', name: "Settler", price: 100, cps: 5, icon: '👨‍🌾' },
            { id: 'turret', name: "Turret", price: 1000, cps: 35, icon: '🔫' },
            { id: 'purifier', name: "Purifier", price: 500, cps: 15, icon: '💧' }
        ];

        const RARE_LOOT = [
            { name: "Gold Deathclaw Hide", val: 5000 },
            { name: "Pre-War Tech", val: 1500 },
            { name: "Quantum", val: 500 }
        ];

        const PAINTS = [
            { name: "Steel", color: "#888888" },
            { name: "Military", color: "#4B5320" },
            { name: "Vault-Tec", color: "#0050b3" },
            { name: "Institute", color: "#ffffff" },
            { name: "Flame", color: "#ff4400" }
        ];

        function manualClick() {
            state.caps += 1;
            if(Math.random() < 0.10) {
                let found = RARE_LOOT[Math.floor(Math.random() * RARE_LOOT.length)];
                state.loot[found.name] = (state.loot[found.name] || 0) + 1;
                document.getElementById('loot-alert').innerText = "FOUND: " + found.name;
                setTimeout(() => document.getElementById('loot-alert').innerText = "", 1500);
            }
            update();
        }

        function sellLoot(name) {
            let item = RARE_LOOT.find(l => l.name === name);
            if(state.loot[name] > 0) {
                state.caps += item.val;
                state.loot[name]--;
                update();
            }
        }

        function checkSecret() {
            state.secretClicks++;
            if(state.secretClicks === 10) { state.caps += 10000; alert("VAULT CACHE OPENED!"); }
            update();
        }

        function buy(id, list) {
            let item = list.find(i => i.id === id);
            let count = state.counts[id] || 0;
            let price = Math.floor(item.price * Math.pow(1.2, count));
            if (state.caps >= price) {
                state.caps -= price;
                state.counts[id] = count + 1;
                if (item.type === 'PA') {
                    state.inventory.push({ ...item, instanceId: Date.now() });
                    state.paCustoms[state.inventory.length-1] = { paint: "#888888", paintName: "Steel" };
                }
                update();
            }
        }

        function openPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function changePaint(index, color, name) {
            state.paCustoms[index].paint = color;
            state.paCustoms[index].paintName = name;
            update();
        }

        function update() {
            document.getElementById('cap-text').innerText = Math.floor(state.caps).toLocaleString();
            let totalCPS = WORKSHOP.reduce((sum, item) => sum + ((state.counts[item.id] || 0) * item.cps), 0);
            document.getElementById('cps-text').innerText = "Production: " + totalCPS + "/sec";

            // Trade
            let lootHTML = '';
            for(let key in state.loot) {
                if(state.loot[key] > 0) lootHTML += `<button class="btn" onclick="sellLoot('${key}')">Sell ${key} (x${state.loot[key]}) <span class="price">${RARE_LOOT.find(l=>l.name===key).val}c</span></button>`;
            }
            document.getElementById('inventory-list').innerHTML = lootHTML || "Empty Packs.";

            // Market
            let marketHTML = '';
            MARKET.forEach(item => marketHTML += `<button class="btn" onclick="buy('${item.id}', MARKET)">${item.name} <span class="price">${item.price}c</span></button>`);
            document.getElementById('market-list').innerHTML = marketHTML;

            // Workshop
            let workshopHTML = '';
            WORKSHOP.forEach(item => {
                let count = state.counts[item.id] || 0;
                let price = Math.floor(item.price * Math.pow(1.2, count));
                workshopHTML += `<button class="btn" onclick="buy('${item.id}', WORKSHOP)">${item.name} (x${count}) <span class="price">${price}c</span></button>`;
            });
            document.getElementById('workshop-list').innerHTML = workshopHTML;

            // Visual Settlement
            let vHTML = '';
            WORKSHOP.forEach(item => { for(let i=0; i<(state.counts[item.id]||0); i++) vHTML += `<span class="v-item">${item.icon}</span>`; });
            document.getElementById('settlement-view').innerHTML = vHTML;

            // GARAGE (VISUAL)
            let garageHTML = '';
            state.inventory.forEach((pa, idx) => {
                let custom = state.paCustoms[idx];
                garageHTML += `
                    <div class="pa-display">
                        <div class="pa-icon" style="color:${custom.paint}">${pa.icon}</div>
                        <div class="pa-stats">${pa.name} - ${custom.paintName} Coating</div>
                        <div style="margin-top:10px;">
                            ${PAINTS.map(p => `<span class="swatch" style="background:${p.color}" onclick="changePaint(${idx}, '${p.color}', '${p.name}')"></span>`).join('')}
                        </div>
                    </div>`;
            });
            document.getElementById('garage-content').innerHTML = garageHTML || "No Armor found in wasteland.";
        }

        setInterval(() => {
            let totalCPS = WORKSHOP.reduce((sum, item) => sum + ((state.counts[item.id] || 0) * item.cps), 0);
            state.caps += totalCPS / 10;
            update();
        }, 100);

        update();
    </script>
</body>
</html>
