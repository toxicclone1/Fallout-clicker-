<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fallout: Command Terminal</title>
    <style>
        :root { --p-green: #00ff41; --p-dark: #050505; --p-gold: #ffcc00; }
        body { 
            background-color: var(--p-dark); color: var(--p-green); 
            font-family: 'Courier New', Courier, monospace; margin: 0; padding: 0;
            user-select: none; touch-action: manipulation;
        }
        
        #hud { border-bottom: 2px solid var(--p-green); padding: 10px; background: #000; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .cap-count { font-size: 18px; color: var(--p-gold); cursor: pointer; }

        .tabs { display: flex; background: #111; border-bottom: 1px solid var(--p-green); }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: var(--p-green); font-weight: bold; font-size: 10px; text-transform: uppercase; }
        .tab-btn.active { background: var(--p-green); color: #000; }

        .page { display: none; padding: 15px; height: calc(100vh - 180px); overflow-y: auto; }
        .page.active { display: block; }

        /* RELIABLE SETTLEMENT GRID */
        #settlement-grid {
            width: 100%; height: 260px; background: #0a0a0a; border: 1px solid var(--p-green);
            position: relative; overflow: hidden;
            background-image: linear-gradient(rgba(0,255,65,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,65,0.1) 1px, transparent 1px);
            background-size: 25px 25px;
        }
        .placed-item { position: absolute; padding: 5px; border: 1px solid var(--p-green); background: rgba(0,255,65,0.2); font-size: 10px; font-weight: bold; transform: translate(-50%, -50%); pointer-events: none; }

        /* POWER ARMOR SVG - REAL LOOK */
        .pa-card { background: #111; border: 1px solid var(--p-green); margin-bottom: 15px; padding: 10px; text-align: center; border-radius: 8px; }
        .pa-svg { width: 130px; height: 170px; filter: drop-shadow(0 0 5px var(--p-green)); margin: 10px auto; display: block; }
        
        .btn { background: #000; border: 1px solid var(--p-green); color: var(--p-green); padding: 12px; margin: 5px 0; width: 100%; text-align: left; font-family: inherit; font-size: 11px; border-radius: 4px; }
        .btn:active { background: var(--p-green); color: #000; }
        .price { color: var(--p-gold); float: right; }

        #radio-bar { position: fixed; bottom: 0; width: 100%; height: 50px; background: #000; border-top: 2px solid var(--p-green); display: flex; align-items: center; padding: 0 10px; font-size: 10px; }
    </style>
</head>
<body>

<div id="hud">
    <div onclick="checkSecret()" class="cap-count">CAPS: <span id="cap-text">0</span></div>
    <div style="font-size:10px; text-align:right">DEFENSE: <span id="def-text">0</span><br>INCOME: <span id="inc-text">0</span></div>
</div>

<div class="tabs">
    <button id="btn-scavenge" class="tab-btn active" onclick="openPage('scavenge')">SCAVENGE</button>
    <button id="btn-settlement" class="tab-btn" onclick="openPage('settlement')">SETTLE</button>
    <button id="btn-garage" class="tab-btn" onclick="openPage('garage')">GARAGE</button>
</div>

<div id="scavenge" class="page active">
    <div id="loot-log" style="height:25px; font-size:10px; text-align:center; color:var(--p-gold); font-weight:bold;"></div>
    <button class="btn" style="height:70px; text-align:center; font-size:14px;" onclick="manualScavenge()">RUN EXPLORATION PROTOCOL</button>
    
    <h4 style="border-bottom:1px solid var(--p-green); margin-top:20px;">ACQUISITION TERMINAL</h4>
    <div id="market-list"></div>
    
    <h4 style="border-bottom:1px solid var(--p-green); margin-top:20px;">VALUABLES</h4>
    <div id="loot-list"></div>
</div>

<div id="settlement" class="page">
    <p style="font-size:10px; text-align:center;">Select item, then tap grid to place:</p>
    <div id="settlement-grid" onclick="placeOnGrid(event)"></div>
    <div id="build-options" style="display:flex; gap:5px; margin-top:10px;">
        <button class="btn" style="flex:1; text-align:center;" onclick="selectBuild('mutfruit')">MUTFRUIT<br>150C</button>
        <button class="btn" style="flex:1; text-align:center;" onclick="selectBuild('wall')">WALL<br>300C</button>
        <button class="btn" style="flex:1; text-align:center;" onclick="selectBuild('turret')">TURRET<br>1.2k</button>
    </div>
    <div id="selected-msg" style="font-size:10px; text-align:center; margin-top:5px; color:var(--p-gold)"></div>
</div>

<div id="garage" class="page">
    <div id="pa-display"></div>
</div>

<div id="radio-bar">
    <div style="flex:1">SIGNAL: <span id="station" style="color:var(--p-gold)">DIAMOND CITY RADIO</span></div>
    <button class="btn" style="width:60px; margin:0" onclick="nextRadio()">TUNE</button>
</div>

<script>
let state = { caps: 0, def: 0, inc: 0, pa: [], loot: {}, secret: 0, station: 0, selectedBuild: null };
const STATIONS = ["DIAMOND CITY", "ENCLAVE", "FREEDOM", "OFF"];

const PA_TYPES = {
    't45': { name: 'T-45 MODEL', price: 4000, d: "M30,30 L70,30 L80,180 L20,180 Z M40,10 L60,10 L65,30 L35,30 Z" },
    't60': { name: 'T-60 MODEL', price: 20000, d: "M25,25 L75,25 L90,185 L10,185 Z M35,5 L65,5 L70,30 L30,30 Z" },
    'x01': { name: 'X-01 MODEL', price: 55000, d: "M20,40 L80,40 L105,190 L-5,190 Z M30,15 L70,15 L80,45 L20,45 Z" }
};

const MODS = {
    'mutfruit': { p: 150, i: 5, d: 0, l: 'PLANT' },
    'wall': { p: 300, i: 0, d: 20, l: 'WALL' },
    'turret': { p: 1200, i: 0, d: 75, l: 'TURRET' }
};

function openPage(p) {
    document.querySelectorAll('.page').forEach(pg => pg.style.display = 'none');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(p).style.display = 'block';
    document.getElementById('btn-' + p).classList.add('active');
}

function manualScavenge() {
    state.caps += 2;
    if (Math.random() < 0.1) {
        const items = ["GOLD HIDE", "PRE-WAR TECH", "FUSION CORE"];
        let itm = items[Math.floor(Math.random()*items.length)];
        state.loot[itm] = (state.loot[itm] || 0) + 1;
        document.getElementById('loot-log').innerText = "SYSTEM: " + itm + " RECOVERED";
        setTimeout(() => { if(document.getElementById('loot-log').innerText.includes(itm)) document.getElementById('loot-log').innerText = ""; }, 2000);
    }
    update();
}

function selectBuild(id) {
    state.selectedBuild = id;
    document.getElementById('selected-msg').innerText = "PLACING: " + id.toUpperCase();
}

function placeOnGrid(e) {
    if (!state.selectedBuild) return;
    let mod = MODS[state.selectedBuild];
    if (state.caps >= mod.p) {
        state.caps -= mod.p;
        let rect = document.getElementById('settlement-grid').getBoundingClientRect();
        let x = e.clientX - rect.left;
        let y = e.clientY - rect.top;
        
        let el = document.createElement('div');
        el.className = 'placed-item';
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        el.innerText = mod.l;
        document.getElementById('settlement-grid').appendChild(el);
        
        state.def += mod.d; state.inc += mod.i;
        update();
    } else {
        alert("INSUFFICIENT CAPS");
    }
}

function buyPA(id) {
    if (state.caps >= PA_TYPES[id].price) {
        state.caps -= PA_TYPES[id].price;
        state.pa.push({ id: id, color: "#555", pName: "STEEL" });
        update();
    }
}

function nextRadio() {
    state.station = (state.station + 1) % STATIONS.length;
    document.getElementById('station').innerText = STATIONS[state.station];
}

function checkSecret() {
    state.secret++;
    if(state.secret === 10) { state.caps += 10000; alert("OVERRIDE: +10,000 CAPS"); }
    update();
}

function update() {
    document.getElementById('cap-text').innerText = Math.floor(state.caps).toLocaleString();
    document.getElementById('def-text').innerText = state.def;
    document.getElementById('inc-text').innerText = state.inc;

    let mH = '';
    for(let id in PA_TYPES) mH += `<button class="btn" onclick="buyPA('${id}')">BUY ${PA_TYPES[id].name} <span class="price">${PA_TYPES[id].price}C</span></button>`;
    document.getElementById('market-list').innerHTML = mH;

    let lH = '';
    for(let l in state.loot) if(state.loot[l]>0) lH += `<button class="btn" onclick="state.caps+=600; state.loot['${l}']--; update()">SELL ${l} (x${state.loot[l]}) <span class="price">600C</span></button>`;
    document.getElementById('loot-list').innerHTML = lH || "<div style='font-size:9px; opacity:0.5;'>NO VALUABLES IN INVENTORY</div>";

    let paH = '';
    state.pa.forEach((p, i) => {
        let type = PA_TYPES[p.id];
        paH += `<div class="pa-card">
            <svg class="pa-svg" viewBox="0 0 100 200">
                <path d="${type.d}" fill="${p.color}" stroke="var(--p-green)" stroke-width="2"/>
            </svg>
            <p style="font-size:12px;">${type.name} [${p.pName}]</p>
            <div style="display:flex; gap:5px">
                <button class="btn" style="flex:1; text-align:center; font-size:8px" onclick="state.pa[${i}].color='#0050b3'; state.pa[${i}].pName='VAULT'; update()">VAULT</button>
                <button class="btn" style="flex:1; text-align:center; font-size:8px" onclick="state.pa[${i}].color='#4B5320'; state.pa[${i}].pName='ARMY'; update()">ARMY</button>
            </div>
        </div>`;
    });
    document.getElementById('pa-display').innerHTML = paH || "<div style='padding:40px; opacity:0.5;'>NO POWER ARMOR DETECTED</div>";
}

setInterval(() => { state.caps += (state.inc / 10); update(); }, 100);
update();
</script>
</body>
</html>
