<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fallout: Command Terminal</title>
    <style>
        :root { --p-green: #00ff41; --p-dark: #050505; --p-gold: #ffcc00; --p-red: #ff4444; }
        body { 
            background-color: var(--p-dark); color: var(--p-green); 
            font-family: 'Courier New', Courier, monospace; margin: 0; padding: 0;
            user-select: none; touch-action: manipulation;
        }
        
        #hud { border-bottom: 2px solid var(--p-green); padding: 10px; background: #000; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .cap-count { font-size: 18px; color: var(--p-gold); cursor: pointer; text-shadow: 0 0 5px var(--p-gold); }

        .tabs { display: flex; background: #111; border-bottom: 1px solid var(--p-green); }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: var(--p-green); font-weight: bold; font-size: 10px; }
        .tab-btn.active { background: var(--p-green); color: #000; }

        .page { display: none; padding: 15px; height: calc(100vh - 180px); overflow-y: auto; }
        .page.active { display: block; }

        /* SETTLEMENT GRID */
        #settlement-grid {
            width: 100%; height: 350px; background: #080808; border: 1px solid var(--p-green);
            position: relative; overflow: hidden;
            background-image: linear-gradient(rgba(0,255,65,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,65,0.05) 1px, transparent 1px);
            background-size: 25px 25px;
        }
        .placed-item { position: absolute; transform: translate(-50%, -50%); transition: top 3s linear, left 3s linear; pointer-events: none; }
        .placed-item img { height: 45px; filter: drop-shadow(0 0 5px rgba(0,255,65,0.5)); }

        .pa-card { background: #111; border: 1px solid var(--p-green); margin-bottom: 20px; padding: 15px; text-align: center; border-radius: 10px; }
        .pa-img-container { width: 100%; height: 220px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; background: #080808; border-radius: 5px; }
        .pa-png { max-height: 200px; max-width: 100%; filter: drop-shadow(0 0 10px rgba(0,255,65,0.3)); }
        
        .paint-vault { filter: drop-shadow(0 0 10px #0050b3) sepia(1) saturate(5) hue-rotate(190deg) !important; }
        .paint-army { filter: drop-shadow(0 0 10px #4B5320) sepia(1) saturate(2) hue-rotate(60deg) !important; }

        .btn { background: #000; border: 1px solid var(--p-green); color: var(--p-green); padding: 12px; margin: 5px 0; width: 100%; text-align: left; font-family: inherit; font-size: 11px; }
        .btn:active { background: var(--p-green); color: #000; }
        .price { color: var(--p-gold); float: right; }

        #raid-alert { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--p-red); color: white; padding: 20px; border: 4px solid white; z-index: 2000; display: none; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div id="raid-alert">!!! RAID IN PROGRESS !!!</div>

<div id="hud">
    <div onclick="checkSecret()" class="cap-count">CAPS: <span id="cap-text">0</span></div>
    <div style="font-size:10px; text-align:right">DEF: <span id="def-text">0</span> | INC: <span id="inc-text">0</span></div>
</div>

<div class="tabs">
    <button id="tab-scavenge" class="tab-btn active" onclick="show('scavenge')">SCAVENGE</button>
    <button id="tab-settle" class="tab-btn" onclick="show('settle')">SETTLE</button>
    <button id="tab-garage" class="tab-btn" onclick="show('garage')">GARAGE</button>
</div>

<div id="scavenge" class="page active">
    <div id="loot-log" style="height:25px; font-size:10px; text-align:center; color:var(--p-gold);"></div>
    <button class="btn" style="height:80px; text-align:center; font-size:14px;" onclick="manualScavenge()">EXTRACT RESOURCES</button>
    <div id="market-list"></div>
    <h4 style="border-bottom:1px solid var(--p-green);">TRADING POST</h4>
    <div id="loot-list"></div>
</div>

<div id="settle" class="page">
    <div id="settlement-grid" onclick="placeOnGrid(event)"></div>
    <div style="display:flex; gap:5px; margin-top:10px; flex-wrap: wrap;">
        <button class="btn" style="flex:1; min-width: 45%;" onclick="sel('settler')">SETTLER<br>500C</button>
        <button class="btn" style="flex:1; min-width: 45%;" onclick="sel('mutfruit')">MUTFRUIT<br>150C</button>
        <button class="btn" style="flex:1; min-width: 45%;" onclick="sel('wall')">WALL<br>300C</button>
        <button class="btn" style="flex:1; min-width: 45%;" onclick="sel('turret')">TURRET<br>1.5K</button>
    </div>
    <div id="sel-msg" style="font-size:10px; text-align:center; color:var(--p-gold); margin-top:5px;"></div>
</div>

<div id="garage" class="page">
    <div id="pa-display"></div>
</div>

<script>
let state = { caps: 0, def: 0, inc: 0, pa: [], loot: {}, secret: 0, currentSel: null };

const ASSETS = {
    't45': { name: 'T-45', price: 3000, img: 'https://images.wikia.com/fallout/images/e/e4/T-45_Power_Armor_FO4.png' },
    't51': { name: 'T-51', price: 10000, img: 'https://images.wikia.com/fallout/images/5/5e/T-51_Power_Armor_FO4.png' },
    't60': { name: 'T-60', price: 25000, img: 'https://images.wikia.com/fallout/images/d/d4/T-60_Power_Armor_FO4.png' },
    'x01': { name: 'X-01', price: 60000, img: 'https://images.wikia.com/fallout/images/1/1b/X-01_Power_Armor_FO4.png' }
};

const ITEMS = {
    'settler': { p: 500, i: 20, d: 0, img: 'https://images.wikia.com/fallout/images/c/c3/FO4_Settler_male.png', type: 'ai' },
    'mutfruit': { p: 150, i: 8, d: 0, img: 'https://images.wikia.com/fallout/images/f/f3/Mutfruit_FO4.png' },
    'wall': { p: 300, i: 0, d: 30, img: 'https://images.wikia.com/fallout/images/8/82/Junk_fence_FO4.png' },
    'turret': { p: 1500, i: 0, d: 100, img: 'https://images.wikia.com/fallout/images/c/c5/Machine_gun_turret_FO4.png' }
};

function show(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('tab-' + id).classList.add('active');
}

function manualScavenge() {
    state.caps += 2;
    if (Math.random() < 0.1) {
        const loots = ["GOLD HIDE", "TECH DATA", "FUSION CORE"];
        let itm = loots[Math.floor(Math.random()*loots.length)];
        state.loot[itm] = (state.loot[itm] || 0) + 1;
        document.getElementById('loot-log').innerText = "FOUND: " + itm;
    }
    update();
}

function sel(id) { state.currentSel = id; document.getElementById('sel-msg').innerText = "SELECTED: " + id.toUpperCase(); }

function placeOnGrid(e) {
    if (!state.currentSel) return;
    let item = ITEMS[state.currentSel];
    if (state.caps >= item.p) {
        state.caps -= item.p;
        let rect = document.getElementById('settlement-grid').getBoundingClientRect();
        let el = document.createElement('div');
        el.className = 'placed-item';
        if(item.type === 'ai') el.classList.add('settler-ai');
        el.style.left = (e.clientX - rect.left) + 'px';
        el.style.top = (e.clientY - rect.top) + 'px';
        el.innerHTML = `<img src="${item.img}">`;
        document.getElementById('settlement-grid').appendChild(el);
        state.def += item.d; state.inc += item.i;
        update();
    }
}

// Settler Movement Logic
setInterval(() => {
    document.querySelectorAll('.settler-ai').forEach(s => {
        let x = Math.random() * 90 + 5;
        let y = Math.random() * 90 + 5;
        s.style.left = x + '%';
        s.style.top = y + '%';
    });
}, 4000);

// Attack System (1 Minute)
setInterval(() => {
    let raidBox = document.getElementById('raid-alert');
    raidBox.style.display = 'block';
    setTimeout(() => {
        raidBox.style.display = 'none';
        let attackPower = Math.random() * (state.inc * 2 + 200);
        if (state.def < attackPower) {
            let stolen = Math.floor(state.caps * 0.2);
            state.caps -= stolen;
            alert(`RAID FAILED! Raiders stole ${stolen} caps. Strengthen your defenses!`);
        } else {
            alert("DEFENSE SUCCESSFUL! Raiders were repelled.");
        }
        update();
    }, 3000);
}, 60000);

function checkSecret() {
    state.secret++;
    if(state.secret === 10) { state.caps += 10000; alert("VAULT CACHE: +10,000"); }
    if(state.secret === 20) {
        state.loot["dildo"] = (state.loot["dildo"] || 0) + 1;
        alert("ITEM ACQUIRED: dildo");
    }
    update();
}

function update() {
    document.getElementById('cap-text').innerText = Math.floor(state.caps).toLocaleString();
    document.getElementById('def-text').innerText = state.def;
    document.getElementById('inc-text').innerText = state.inc;

    let mH = '<h4 style="border-bottom:1px solid var(--p-green);">ARMORY MARKET</h4>';
    for(let id in ASSETS) mH += `<button class="btn" onclick="buyPA('${id}')">BUY ${ASSETS[id].name} <span class="price">${ASSETS[id].price}C</span></button>`;
    document.getElementById('market-list').innerHTML = mH;

    let lH = '';
    for(let l in state.loot) {
        if(state.loot[l] > 0) {
            if(l === "dildo") {
                lH += `<button class="btn" style="color:var(--p-red);" disabled>SELL ${l.toUpperCase()} <span class="price">TO SLIMY</span></button>`;
            } else {
                lH += `<button class="btn" onclick="state.caps+=600; state.loot['${l}']--; update()">SELL ${l} <span class="price">600C</span></button>`;
            }
        }
    }
    document.getElementById('loot-list').innerHTML = lH || "EMPTY";

    let paH = '';
    state.pa.forEach((p, i) => {
        let data = ASSETS[p.id];
        paH += `<div class="pa-card">
            <div class="pa-img-container"><img src="${data.img}" class="pa-png ${p.paint}"></div>
            <p style="font-size:12px; font-weight:bold;">${data.name} POWER ARMOR</p>
            <div style="display:flex; gap:5px">
                <button class="btn" style="flex:1; text-align:center; font-size:8px;" onclick="state.pa[${i}].paint='paint-vault'; update()">VAULT-TEC</button>
                <button class="btn" style="flex:1; text-align:center; font-size:8px;" onclick="state.pa[${i}].paint='paint-army'; update()">MILITARY</button>
            </div>
        </div>`;
    });
    document.getElementById('pa-display').innerHTML = paH || "NO POWER ARMOR RECORDED";
}

function buyPA(id) {
    if (state.caps >= ASSETS[id].price) {
        state.caps -= ASSETS[id].price;
        state.pa.push({ id: id, paint: '' });
        update();
    }
}

setInterval(() => { state.caps += (state.inc / 10); update(); }, 100);
update();
</script>
</body>
</html>
