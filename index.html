<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wasteland Tycoon</title>
    <style>
        :root { --p-green: #00ff41; --p-dark: #050505; --p-gold: #ffcc00; }
        body { 
            background-color: var(--p-dark); color: var(--p-green); 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; padding: 15px; overflow-x: hidden;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        #hud { border-bottom: 2px solid var(--p-green); padding: 10px; position: sticky; top: 0; background: var(--p-dark); z-index: 10; }
        .cap-count { font-size: 28px; color: var(--p-gold); margin: 0; }
        
        /* Big Tap Area */
        #scavenge-btn {
            background: #111; border: 2px dashed var(--p-green);
            height: 120px; display: flex; align-items: center; justify-content: center;
            margin: 20px 0; font-weight: bold; font-size: 20px; border-radius: 10px;
        }
        #scavenge-btn:active { background: #222; transform: scale(0.98); }

        /* Shop Styling */
        .section-title { text-transform: uppercase; border-left: 5px solid var(--p-green); padding-left: 10px; margin-top: 30px; }
        .shop-item {
            background: #111; border: 1px solid var(--p-green);
            padding: 15px; margin: 10px 0; border-radius: 5px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .shop-item:active { background: var(--p-green); color: #000; }
        .item-info { flex-grow: 1; }
        .price { color: var(--p-gold); font-weight: bold; }
        .rarity-rare { border-color: #0088ff; color: #0088ff; }
        .rarity-legend { border-color: var(--p-gold); color: var(--p-gold); }

        .owned-tag { font-size: 12px; background: #222; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>

    <div id="hud">
        <p class="cap-count" id="cap-text">0 CAPS</p>
        <div id="cps-text">Production: 0.0/sec</div>
    </div>

    <div id="scavenge-btn" onclick="scavenge()">TAP TO SCAVENGE</div>

    <h3 class="section-title">Settlement Assets</h3>
    <div id="assets-list"></div>

    <h3 class="section-title">Power Armor & Items</h3>
    <div id="items-list"></div>

    <button onclick="resetGame()" style="margin-top:50px; background:none; border:none; color:#444; width:100%;">[Wipe Save Data]</button>

    <script>
        // --- Game Data ---
        let state = {
            caps: 0,
            counts: [0, 0, 0], // Mutfruit, Water, Industrial
            ownedItems: []
        };

        const ASSETS = [
            { name: "Mutfruit Plant", basePrice: 15, cps: 1 },
            { name: "Water Purifier", basePrice: 100, cps: 8 },
            { name: "Industrial Purifier", basePrice: 1100, cps: 47 }
        ];

        const RARE_ITEMS = [
            { name: "T-45 Power Armor", price: 5000, rarity: "rare" },
            { name: "T-51 Power Armor", price: 15000, rarity: "rare" },
            { name: "X-01 Power Armor", price: 50000, rarity: "legend" },
            { name: "Gatling Laser", price: 100000, rarity: "legend" }
        ];

        // --- Logic ---
        function scavenge() {
            state.caps += 1;
            updateUI();
        }

        function buyAsset(index) {
            let price = Math.floor(ASSETS[index].basePrice * Math.pow(1.15, state.counts[index]));
            if (state.caps >= price) {
                state.caps -= price;
                state.counts[index]++;
                save();
                updateUI();
            }
        }

        function buyItem(index) {
            let item = RARE_ITEMS[index];
            if (state.caps >= item.price && !state.ownedItems.includes(item.name)) {
                state.caps -= item.price;
                state.ownedItems.push(item.name);
                save();
                updateUI();
            }
        }

        function updateUI() {
            // Update Caps and CPS
            let currentCPS = state.counts.reduce((acc, count, i) => acc + (count * ASSETS[i].cps), 0);
            document.getElementById('cap-text').innerText = Math.floor(state.caps) + " CAPS";
            document.getElementById('cps-text').innerText = "Production: " + currentCPS.toFixed(1) + "/sec";

            // Draw Assets
            let assetHTML = '';
            ASSETS.forEach((a, i) => {
                let price = Math.floor(a.basePrice * Math.pow(1.15, state.counts[i]));
                assetHTML += `
                    <div class="shop-item" onclick="buyAsset(${i})">
                        <div class="item-info">
                            <b>${a.name}</b> <span class="owned-tag">x${state.counts[i]}</span><br>
                            <small>+${a.cps} cps</small>
                        </div>
                        <div class="price">${price}c</div>
                    </div>`;
            });
            document.getElementById('assets-list').innerHTML = assetHTML;

            // Draw Items
            let itemHTML = '';
            RARE_ITEMS.forEach((item, i) => {
                let owned = state.ownedItems.includes(item.name);
                itemHTML += `
                    <div class="shop-item rarity-${item.rarity}" onclick="buyItem(${i})">
                        <div class="item-info">
                            <b>${item.name}</b><br>
                            <small>${owned ? "ALREADY OWNED" : item.rarity.toUpperCase()}</small>
                        </div>
                        <div class="price">${owned ? "DONE" : item.price + "c"}</div>
                    </div>`;
            });
            document.getElementById('items-list').innerHTML = itemHTML;
        }

        // --- Engine ---
        function save() { localStorage.setItem('fallout_save', JSON.stringify(state)); }
        function load() {
            const saved = localStorage.getItem('fallout_save');
            if (saved) state = JSON.parse(saved);
        }
        function resetGame() { localStorage.clear(); location.reload(); }

        // Idle Loop (Runs every 100ms)
        setInterval(() => {
            let currentCPS = state.counts.reduce((acc, count, i) => acc + (count * ASSETS[i].cps), 0);
            state.caps += currentCPS / 10;
            updateUI();
        }, 100);

        load();
        updateUI();
    </script>
</body>
</html>
