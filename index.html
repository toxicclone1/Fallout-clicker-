<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fallout 4: Survival Manager</title>
    <style>
        :root { --p-green: #00ff41; --p-dark: #050505; --p-gold: #ffcc00; --p-blue: #0088ff; --p-red: #ff3333; }
        body { 
            background-color: var(--p-dark); color: var(--p-green); 
            font-family: 'Courier New', Courier, monospace; margin: 0; padding: 0;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        
        #hud { border-bottom: 2px solid var(--p-green); padding: 15px; background: #000; position: sticky; top: 0; z-index: 100; }
        .cap-count { font-size: 22px; color: var(--p-gold); margin: 0; cursor: pointer; }
        .defense-count { color: var(--p-red); font-weight: bold; }
        
        .tabs { display: flex; background: #111; border-bottom: 1px solid var(--p-green); overflow-x: auto; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; color: var(--p-green); font-family: inherit; font-weight: bold; font-size: 11px; }
        .tab-btn.active { background: var(--p-green); color: #000; }

        .page { display: none; padding: 20px; padding-bottom: 120px; }
        .page.active { display: block; }

        /* Realistic Power Armor Drawing */
        .pa-frame {
            width: 120px; height: 180px; position: relative;
            background: #222; border-radius: 10px; border: 4px solid #444;
            margin: 20px auto; transition: 0.5s;
        }
        .pa-head { width: 40px; height: 35px; background: inherit; border: 2px solid #000; position: absolute; top: -20px; left: 40px; border-radius: 50% 50% 0 0; }
        .pa-shoulder-l, .pa-shoulder-r { width: 45px; height: 40px; background: inherit; border: 2px solid #000; position: absolute; top: 20px; border-radius: 10px; }
        .pa-shoulder-l { left: -30px; } .pa-shoulder-r { right: -30px; }
        .pa-chest { width: 80px; height: 90px; background: inherit; border: 2px solid #000; position: absolute; top: 15px; left: 20px; border-radius: 5px; }

        .btn { 
            background: #111; border: 1px solid var(--p-green); color: var(--p-green);
            padding: 12px; margin: 8px 0; width: 100%; text-align: left; border-radius: 5px; font-size: 13px;
        }
        .btn:active { background: #222; }
        .price { color: var(--p-gold); float: right; }
        
        #settlement-view { height: 100px; border: 1px solid #333; margin-bottom: 15px; display: flex; flex-wrap: wrap; padding: 10px; gap: 5px; background: #080808; }
        .v-item { font-size: 18px; }

        .swatch-box { display: flex; justify-content: center; gap: 10px; margin-top: 50px; }
        .swatch { width: 30px; height: 30px; border: 2px solid #fff; border-radius: 5px; }
        
        #alert-box { 
            position: fixed; bottom: 80px; left: 5%; width: 90%; 
            background: var(--p-red); color: #fff; padding: 10px; 
            text-align: center; font-weight: bold; display: none; z-index: 200;
        }
    </style>
</head>
<body>

    <div id="alert-box">RAIDERS ATTACKING!</div>

    <div id="hud">
        <p class="cap-count" onclick="checkSecret()">CAPS: <span id="cap-text">0</span></p>
        <small id="cps-text">Income: 0/sec</small> | <small class="defense-count">DEFENSE: <span id="def-text">0</span></small>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openPage('scavenge')">SCAVENGE</button>
        <button class="tab-btn" onclick="openPage('trade')">TRADE</button>
        <button class="tab-btn" onclick="openPage('settlement')">SETTLEMENT</button>
        <button class="tab-btn" onclick="openPage('garage')">GARAGE</button>
    </div>

    <div id="scavenge" class="page active">
        <div id="loot-alert" style="color:var(--p-gold); height:20px; text-align:center; font-size: 12px;"></div>
        <div style="height:80px; border:2px dashed var(--p-green); display:flex; align-items:center; justify-content:center; font-weight:bold; margin-bottom:20px;" onclick="manualClick()">SCAVENGE WASTELAND</div>
        <h3>MARKET</h3>
        <div id="market-list"></div>
    </div>

    <div id="trade" class="page">
        <h3>INVENTORY (SELL)</h3>
        <div id="inventory-list"></div>
    </div>

    <div id="settlement" class="page">
        <h3>COMMUNITY VIEW</h3>
        <div id="settlement-view"></div>
        <div id="workshop-list"></div>
    </div>

    <div id="garage" class="page">
        <h3>POWER ARMOR STATION</h3>
        <div id="garage-content"></div>
    </div>

    <script>
        let state = {
            caps: 0, secretClicks: 0, counts: {}, inventory: [], loot: {}, paCustoms: {}
        };

        const MARKET = [
            { id: 't45', name: "T-45 Power Armor", price: 3000, type: 'PA' },
            { id: 't60', name: "T-60 Power Armor", price: 20000, type: 'PA' }
        ];

        const WORKSHOP = [
            { id: 'settler', name: "Recruit Settler", price: 200, cps: 8, def: 0, icon: '👩‍🌾' },
            { id: 'mutfruit', name: "Mutfruit Plant", price: 80, cps: 3, def: 0, icon: '🌿' },
            { id: 'wall', name: "Junk Wall", price: 400, cps: 0, def: 10, icon: '🧱' },
            { id: 'door', name: "Powered Door", price: 600, cps: 0, def: 15, icon: '🚪' },
            { id: 'turret', name: "Defense Turret", price: 1500, cps: 0, def: 50, icon: '🔫' }
        ];

        const RARE_LOOT = [
            { name: "Gold Deathclaw Hide", val: 1200 }, // Lowered prices for realism
            { name: "Pre-War Tech", val: 400 },
            { name: "Fusion Core", val: 250 }
        ];

        const PAINTS = [
            { name: "Steel", color: "#666" },
            { name: "Military", color: "#4B5320" },
            { name: "Vault-Tec", color: "#0050b3" },
            { name: "Hot Rod Flame", color: "#ff4400" },
            { name: "Institute", color: "#eee" }
        ];

        function manualClick() {
            state.caps += 1;
            if(Math.random() < 0.08) { // 8% chance (Harder)
                let found = RARE_LOOT[Math.floor(Math.random() * RARE_LOOT.length)];
                state.loot[found.name] = (state.loot[found.name] || 0) + 1;
                document.getElementById('loot-alert').innerText = "SCAVENGED: " + found.name;
                setTimeout(() => document.getElementById('loot-alert').innerText = "", 1500);
            }
            update();
        }

        function sellLoot(name) {
            let item = RARE_LOOT.find(l => l.name === name);
            if(state.loot[name] > 0) {
                state.caps += item.val;
                state.loot[name]--;
                update();
            }
        }

        function checkSecret() {
            state.secretClicks++;
            if(state.secretClicks === 10) { state.caps += 10000; alert("VAULT CACHE DISCOVERED!"); }
            update();
        }

        function buy(id, list) {
            let item = list.find(i => i.id === id);
            let count = state.counts[id] || 0;
            let price = Math.floor(item.price * Math.pow(1.3, count));
            if (state.caps >= price) {
                state.caps -= price;
                state.counts[id] = count + 1;
                if (item.type === 'PA') {
                    state.inventory.push({ ...item, id: Date.now() });
                    state.paCustoms[state.inventory.length-1] = { paint: "#666", name: "Standard" };
                }
                update();
            }
        }

        function openPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // RAID SYSTEM (Every 5 Minutes)
        setInterval(() => {
            let totalDef = WORKSHOP.reduce((sum, item) => sum + ((state.counts[item.id] || 0) * item.def), 0);
            let raidStrength = Math.floor(Math.random() * 150);
            
            document.getElementById('alert-box').style.display = 'block';
            setTimeout(() => {
                document.getElementById('alert-box').style.display = 'none';
                if(totalDef < raidStrength) {
                    let loss = Math.floor(state.caps * 0.2);
                    state.caps -= loss;
                    alert("RAID FAILED! You lost " + loss + " caps. Build more Turrets!");
                } else {
                    alert("RAID REPELLED! Your defenses held strong.");
                }
                update();
            }, 3000);
        }, 300000); // 5 Minutes

        function update() {
            document.getElementById('cap-text').innerText = Math.floor(state.caps).toLocaleString();
            let totalCPS = WORKSHOP.reduce((sum, item) => sum + ((state.counts[item.id] || 0) * item.cps), 0);
            let totalDef = WORKSHOP.reduce((sum, item) => sum + ((state.counts[item.id] || 0) * item.def), 0);
            document.getElementById('cps-text').innerText = "Income: " + totalCPS + "/sec";
            document.getElementById('def-text').innerText = totalDef;

            // Trade
            let lootHTML = '';
            for(let key in state.loot) {
                if(state.loot[key] > 0) lootHTML += `<button class="btn" onclick="sellLoot('${key}')">Sell ${key} (x${state.loot[key]}) <span class="price">${RARE_LOOT.find(l=>l.name===key).val}c</span></button>`;
            }
            document.getElementById('inventory-list').innerHTML = lootHTML || "No items to trade.";

            // Shop logic
            let shopHTML = '';
            WORKSHOP.forEach(item => {
                let count = state.counts[item.id] || 0;
                let price = Math.floor(item.price * Math.pow(1.3, count));
                shopHTML += `<button class="btn" onclick="buy('${item.id}', WORKSHOP)">${item.name} (x${count}) <span class="price">${price}c</span></button>`;
            });
            document.getElementById('workshop-list').innerHTML = shopHTML;

            let mHTML = '';
            MARKET.forEach(item => mHTML += `<button class="btn" onclick="buy('${item.id}', MARKET)">${item.name} <span class="price">${item.price}c</span></button>`);
            document.getElementById('market-list').innerHTML = mHTML;

            // Visual Settlement
            let vHTML = '';
            WORKSHOP.forEach(item => { for(let i=0; i<(state.counts[item.id]||0); i++) vHTML += `<span class="v-item">${item.icon}</span>`; });
            document.getElementById('settlement-view').innerHTML = vHTML;

            // GARAGE (REALISTIC DRAWING)
            let gHTML = '';
            state.inventory.forEach((pa, idx) => {
                let c = state.paCustoms[idx];
                gHTML += `
                    <div style="border:1px solid #444; padding:10px; margin-bottom:20px;">
                        <h4 style="text-align:center">${pa.name}</h4>
                        <div class="pa-frame" style="background:${c.paint}">
                            <div class="pa-head"></div><div class="pa-chest"></div>
                            <div class="pa-shoulder-l"></div><div class="pa-shoulder-r"></div>
                        </div>
                        <div class="swatch-box">
                            ${PAINTS.map(p => `<div class="swatch" style="background:${p.color}" onclick="state.paCustoms[${idx}]={paint:'${p.color}', name:'${p.name}'}; update();"></div>`).join('')}
                        </div>
                        <p style="text-align:center; font-size:10px;">Paint: ${c.name}</p>
                    </div>`;
            });
            document.getElementById('garage-content').innerHTML = gHTML || "Empty Garage.";
        }

        setInterval(() => {
            let totalCPS = WORKSHOP.reduce((sum, item) => sum + ((state.counts[item.id] || 0) * item.cps), 0);
            state.caps += totalCPS / 10;
            update();
        }, 100);

        update();
    </script>
</body>
</html>
